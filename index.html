<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Royale avec Chatons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #1a0033 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            position: relative;
            width: min(90vw, 500px);
            height: min(90vw, 500px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Halo lumineux derrière */
        .glow {
            position: absolute;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 50, 200, 0.3) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Cercle de la photo */
        .photo-circle {
            position: relative;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #c9a84c;
            box-shadow: 
                0 0 20px rgba(201, 168, 76, 0.5),
                0 0 40px rgba(100, 50, 200, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
            background: #2a1a4a;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #c9a84c;
            font-size: clamp(10px, 2.5vw, 14px);
            text-align: center;
            padding: 15px;
            cursor: pointer;
        }

        .photo-placeholder .icon {
            font-size: clamp(30px, 8vw, 50px);
            margin-bottom: 8px;
        }

        /* Orbite des chatons */
        .orbit {
            position: absolute;
            width: 88%;
            height: 88%;
            border-radius: 50%;
            animation: rotate 18s linear infinite;
        }

        .orbit-reverse {
            width: 98%;
            height: 98%;
            animation: rotate-reverse 22s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .kitten {
            position: absolute;
            width: clamp(40px, 10vw, 55px);
            height: clamp(40px, 10vw, 55px);
            filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.7));
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .kitten img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .kitten-emoji {
            font-size: 30px;
            display: none;
        }

        .kitten-orbit {
            animation: counter-rotate 18s linear infinite;
        }

        .kitten-orbit-reverse {
            animation: counter-rotate-reverse 22s linear infinite;
        }

        @keyframes counter-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        @keyframes counter-rotate-reverse {
            from { transform: rotate(-360deg); }
            to { transform: rotate(0deg); }
        }

        /* Position des chatons sur l'orbite */
        .kitten:nth-child(1) { top: -12%; left: 50%; margin-left: calc(clamp(40px, 10vw, 55px) / -2); }
        .kitten:nth-child(2) { top: 12%; right: -8%; }
        .kitten:nth-child(3) { bottom: 12%; right: -8%; }
        .kitten:nth-child(4) { bottom: -12%; left: 50%; margin-left: calc(clamp(40px, 10vw, 55px) / -2); }
        .kitten:nth-child(5) { bottom: 12%; left: -8%; }
        .kitten:nth-child(6) { top: 12%; left: -8%; }

        /* Couronne en saphir */
        .crown-container {
            position: absolute;
            top: -8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            animation: float 3s ease-in-out infinite;
        }

        .crown {
            width: clamp(80px, 22vw, 140px);
            height: clamp(60px, 16vw, 100px);
            animation: spin-crown 5s linear infinite;
            filter: drop-shadow(0 0 20px rgba(30, 100, 255, 0.7));
        }

        .crown img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes spin-crown {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Titre */
        .title {
            position: absolute;
            bottom: -14%;
            left: 50%;
            transform: translateX(-50%);
            color: #c9a84c;
            font-size: clamp(16px, 4vw, 22px);
            text-align: center;
            text-shadow: 0 0 10px rgba(201, 168, 76, 0.5);
            white-space: nowrap;
            letter-spacing: 2px;
        }

        /* Étoiles de fond */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Boutons upload */
        .upload-buttons {
            position: absolute;
            bottom: -22%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
        }

        .upload-btn {
            padding: clamp(10px, 2.5vw, 12px) clamp(15px, 4vw, 22px);
            background: linear-gradient(135deg, #c9a84c, #8b6914);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: clamp(11px, 2.8vw, 13px);
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .upload-btn:hover, .upload-btn:active {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.5);
        }

        .upload-btn input {
            display: none;
        }

        .upload-btn.gallery {
            background: linear-gradient(135deg, #6a3093, #a044ff);
            box-shadow: 0 4px 15px rgba(106, 48, 147, 0.3);
        }

        .upload-btn.gallery:hover, .upload-btn.gallery:active {
            box-shadow: 0 6px 20px rgba(106, 48, 147, 0.5);
        }

        /* Anneaux décoratifs */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201, 168, 76, 0.15);
        }

        .ring-1 {
            width: 64%;
            height: 64%;
            animation: ring-pulse 4s ease-in-out infinite;
        }

        .ring-2 {
            width: 76%;
            height: 76%;
            animation: ring-pulse 4s ease-in-out infinite 1s;
        }

        @keyframes ring-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        /* Particules scintillantes */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #c9a84c;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* === MOBILE RESPONSIVE === */
        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding-top: 12vh;
            }

            .container {
                width: 85vw;
                height: 85vw;
            }

            .photo-circle {
                border-width: 3px;
            }

            .kitten {
                width: 38px;
                height: 38px;
            }

            .kitten:nth-child(1) { margin-left: -19px; }
            .kitten:nth-child(4) { margin-left: -19px; }

            .kitten-emoji {
                font-size: 24px;
            }

            .upload-buttons {
                flex-direction: column;
                align-items: center;
                bottom: -28%;
            }

            .upload-btn {
                width: 80%;
                text-align: center;
            }
        }

        @media (max-height: 700px) and (max-width: 480px) {
            body {
                padding-top: 8vh;
            }

            .container {
                width: 75vw;
                height: 75vw;
            }

            .crown-container {
                top: -6%;
            }
        }

        @media (max-height: 600px) {
            body {
                padding-top: 5vh;
            }

            .container {
                width: 65vw;
                height: 65vw;
            }
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding-top: 2vh;
            }

            .container {
                width: 55vh;
                height: 55vh;
            }

            .title {
                bottom: -18%;
            }

            .upload-buttons {
                bottom: -28%;
            }
        }
    </style>
</head>

        <div class="title">✨ Royale Majesté ✨</div>

            <label class="upload-btn gallery">
                🖼️ Galerie
                <input type="file" id="galleryInput" accept="image/*">

            <label class="upload-btn">
                📷 Caméra
                <input type="file" id="cameraInput" accept="image/*" capture="environment">
            </label>
        </div>

    <script>
        // ============================================
        // VÉRIFICATION DES GIFs AU CHARGEMENT
        // ============================================
        function checkGifLoad(imgElement, emojiElement) {
            imgElement.addEventListener('error', function() {
                console.log('GIF failed to load:', imgElement.src);
                imgElement.style.display = 'none';
                if (emojiElement) {
                    emojiElement.style.display = 'block';
                }
            });
            
            imgElement.addEventListener('load', function() {
                console.log('GIF loaded successfully:', imgElement.src);
                imgElement.style.display = 'block';
                if (emojiElement) {
                    emojiElement.style.display = 'none';
                }
            });
        }

        // Vérifier tous les GIFs au chargement
        window.addEventListener('load', function() {
            const allKittens = document.querySelectorAll('.kitten');
            allKittens.forEach(function(kitten) {
                const img = kitten.querySelector('img');
                const emoji = kitten.querySelector('.kitten-emoji');
                if (img && emoji) {
                    checkGifLoad(img, emoji);
                }
            });
        });

        // Générer les étoiles de fond
        const starsContainer = document.getElementById('stars');
        const starCount = window.innerWidth < 480 ? 40 : 80;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (2 + Math.random() * 3) + 's';
            const size = (1 + Math.random() * 2) + 'px';
            star.style.width = size;
            star.style.height = size;
            starsContainer.appendChild(star);
        }

        // Générer les particules scintillantes
        const container = document.querySelector('.container');
        const sparkleCount = window.innerWidth < 480 ? 8 : 15;
        for (let i = 0; i < sparkleCount; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.animationDuration = (1.5 + Math.random() * 2) + 's';
            container.appendChild(sparkle);
        }

        // Gestion de l'upload de photo
        const galleryInput = document.getElementById('galleryInput');
        const cameraInput = document.getElementById('cameraInput');
        const photo = document.getElementById('photo');
        const placeholder = document.getElementById('placeholder');
        const photoCircle = document.getElementById('photoCircle');

        // Fonction pour afficher la photo
        function displayPhoto(file) {
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photo.src = event.target.result;
                    photo.style.display = 'block';
                    placeholder.style.display = 'none';
                    
                    // Sauvegarde dans localStorage
                    localStorage.setItem('profilePhoto', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        // Upload depuis la galerie
        galleryInput.addEventListener('change', function(e) {
            displayPhoto(e.target.files[0]);
        });

        // Upload depuis la caméra
        cameraInput.addEventListener('change', function(e) {
            displayPhoto(e.target.files[0]);
        });

        // Clic sur le cercle pour ouvrir la galerie
        photoCircle.addEventListener('click', function() {
            galleryInput.click();
        });

        // Charger la photo sauvegardée
        window.addEventListener('load', function() {
            const savedPhoto = localStorage.getItem('profilePhoto');
            if (savedPhoto) {
                photo.src = savedPhoto;
                photo.style.display = 'block';
                placeholder.style.display = 'none';
            }
        });

        // Empêcher le double-tap zoom sur mobile
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Ajuster la position des boutons selon la taille de l'écran
        function adjustLayout() {
            const vh = window.innerHeight;
            const containerEl = document.querySelector('.container');
            const containerHeight = containerEl.offsetHeight;
            const containerTop = containerEl.getBoundingClientRect().top;
            const availableSpace = vh - containerTop - containerHeight;

            const uploadButtons = document.querySelector('.upload-buttons');
            const title = document.querySelector('.title');

            if (availableSpace < 120) {
                uploadButtons.style.bottom = '-32%';
                title.style.bottom = '-18%';
            }
        }

        window.addEventListener('resize', adjustLayout);
        window.addEventListener('load', adjustLayout);
    </script>
</body>
</html>
